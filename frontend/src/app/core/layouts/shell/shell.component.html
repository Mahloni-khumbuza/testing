<div class="shell">
  <aside class="sidebar">
    <div class="brand">Boardroom Booking</div>
    <nav>
      @for (item of navItems; track item.path) {
        <a [routerLink]="item.path" routerLinkActive="active">{{ item.label }}</a>
      }
    </nav>
    <button type="button" class="logout" (click)="logout()">Sign out</button>
  </aside>

  <main class="content">
    <router-outlet />
  </main>
</div>
