<section class="auth-shell">
  <div class="auth-card">
    <h1>Create your account</h1>
    <p class="subtitle">Sign up to start booking boardrooms.</p>

    <form [formGroup]="form" (ngSubmit)="submit()" novalidate>
      <div class="row">
        <label class="field">
          <span>First name</span>
          <input type="text" formControlName="firstName" autocomplete="given-name" />
          @if (form.controls.firstName.touched && form.controls.firstName.invalid) {
            <small class="error">Enter your first name.</small>
          }
        </label>

        <label class="field">
          <span>Last name</span>
          <input type="text" formControlName="lastName" autocomplete="family-name" />
          @if (form.controls.lastName.touched && form.controls.lastName.invalid) {
            <small class="error">Enter your last name.</small>
          }
        </label>
      </div>

      <label class="field">
        <span>Work email</span>
        <input type="email" formControlName="email" autocomplete="email" placeholder="you@company.com" />
        @if (form.controls.email.touched && form.controls.email.invalid) {
          <small class="error">Enter a valid email address.</small>
        }
      </label>

      <label class="field">
        <span>Password</span>
        <input type="password" formControlName="password" autocomplete="new-password" placeholder="At least 8 characters" />
        @if (form.controls.password.touched && form.controls.password.invalid) {
          <small class="error">Password must be at least 8 characters.</small>
        }
      </label>

      @if (errorMessage(); as err) {
        <div class="error-banner" role="alert">{{ err }}</div>
      }

      <button type="submit" [disabled]="loading()">
        {{ loading() ? 'Creating account…' : 'Create account' }}
      </button>

      <p class="foot">
        Already have an account? <a routerLink="/login">Sign in</a>
      </p>
    </form>
  </div>
</section>
