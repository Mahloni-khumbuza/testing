<section class="login-shell">
  <div class="login-card">
    <h1>Boardroom Booking</h1>
    <p class="subtitle">Sign in with your work email to continue.</p>

    @if (justRegistered()) {
      <div class="success-banner" role="status">
        Account created. Sign in with your new credentials.
      </div>
    }

    <form [formGroup]="form" (ngSubmit)="submit()" novalidate>
      <label class="field">
        <span>Email</span>
        <input type="email" formControlName="email" autocomplete="email" placeholder="you@company.com" />
        @if (form.controls.email.touched && form.controls.email.invalid) {
          <small class="error">Enter a valid email address.</small>
        }
      </label>

      <label class="field">
        <span>Password</span>
        <input type="password" formControlName="password" autocomplete="current-password" placeholder="••••••••" />
        @if (form.controls.password.touched && form.controls.password.invalid) {
          <small class="error">Password must be at least 6 characters.</small>
        }
      </label>

      @if (errorMessage(); as err) {
        <div class="error-banner" role="alert">{{ err }}</div>
      }

      <button type="submit" [disabled]="loading()">
        {{ loading() ? 'Signing in…' : 'Sign in' }}
      </button>

      <p class="foot">
        Don't have an account? <a routerLink="/register">Create one</a>
      </p>
    </form>
  </div>
</section>
